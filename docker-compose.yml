version: "3.9"

services:
  db:
    image: postgres:15
    container_name: aisc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aisc
      POSTGRES_PASSWORD: aisc
      POSTGRES_DB: aisc
    ports:
      - "5432:5432"
    volumes:
      - aisc_pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: aisc_backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://aisc:aisc@db:5432/aisc
      SECRET_KEY: change-me-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: aisc_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  aisc_pgdata:
